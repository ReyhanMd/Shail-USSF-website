<svg xmlns="http://www.w3.org/2000/svg" width="380" height="520" viewBox="0 0 380 520">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="50%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
  </defs>
  
  <g id="card-background">
    <rect width="380" height="520" rx="16" fill="url(#cardGrad)" stroke="url(#borderGrad)" stroke-width="1"/>
  </g>

  <g id="card-badge" transform="translate(24, 24)">
    <rect width="100" height="28" rx="14" fill="#ffffff"/>
    <text x="50" y="19" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#000000" text-anchor="middle">Most popular</text>
  </g>

  <g id="card-header" transform="translate(24, 70)">
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Pro</text>
    <text x="0" y="60" font-family="system-ui, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">$19</text>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#888888">/month</text>
    
    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Active workspace assistance</text>
    
    <text x="0" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#aaaaaa">Unlock assistive execution, advanced</text>
    <text x="0" y="135" font-family="system-ui, sans-serif" font-size="14" fill="#aaaaaa">memory workflows, and local-first</text>
    <text x="0" y="155" font-family="system-ui, sans-serif" font-size="14" fill="#aaaaaa">agentic productivity.</text>
  </g>

  <g id="card-button" transform="translate(24, 250)">
    <rect width="332" height="48" rx="8" fill="#ffffff"/>
    <text x="166" y="29" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">Get Pro</text>
  </g>

  <g id="card-features" transform="translate(24, 330)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Everything in Free, plus</text>
    
    <!-- Feature 1 -->
    <g transform="translate(0, 20)">
      <circle cx="8" cy="12" r="8" fill="#EB473D"/>
      <path d="M5 12l2 2 4-4" stroke="#ffffff" stroke-width="2" fill="none"/>
      <text x="24" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#cccccc">Unlimited Blueprints &amp; Ascents</text>
    </g>
    <!-- Feature 2 -->
    <g transform="translate(0, 48)">
      <circle cx="8" cy="12" r="8" fill="#EB473D"/>
      <path d="M5 12l2 2 4-4" stroke="#ffffff" stroke-width="2" fill="none"/>
      <text x="24" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#cccccc">Advanced Assist Mode</text>
    </g>
    <!-- Feature 3 -->
    <g transform="translate(0, 76)">
      <circle cx="8" cy="12" r="8" fill="#EB473D"/>
      <path d="M5 12l2 2 4-4" stroke="#ffffff" stroke-width="2" fill="none"/>
      <text x="24" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#cccccc">Priority context indexing</text>
    </g>
    <!-- Feature 4 -->
    <g transform="translate(0, 104)">
      <circle cx="8" cy="12" r="8" fill="#EB473D"/>
      <path d="M5 12l2 2 4-4" stroke="#ffffff" stroke-width="2" fill="none"/>
      <text x="24" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#cccccc">Ghost Cursor semi-auto actions</text>
    </g>
  </g>
</svg>
