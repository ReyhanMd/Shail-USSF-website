<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <g id="card-blur-layer">
    <!-- Represents the backdrop-filter: blur in standard SVG for standard renderers -->
    <rect width="300" height="200" rx="12" fill="url(#glassGrad)" stroke="url(#glassBorder)" stroke-width="1" />
  </g>

  <g id="card-content" transform="translate(24, 24)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Quick Query</text>
    
    <text x="0" y="55" font-family="system-ui, sans-serif" font-size="15" fill="#aaaaaa">Ask SHAIL from any page.</text>
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="15" fill="#aaaaaa">It searches your memory first,</text>
    <text x="0" y="105" font-family="system-ui, sans-serif" font-size="15" fill="#aaaaaa">then routes to guidance if the</text>
    <text x="0" y="130" font-family="system-ui, sans-serif" font-size="15" fill="#aaaaaa">page needs visual help.</text>
  </g>
</svg>
